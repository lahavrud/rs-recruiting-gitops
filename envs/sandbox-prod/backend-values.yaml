# Overlay for the helm/backend chart in lahavrud/rs-recruiting (issue #17).
# image.tag is rewritten by the sandbox-promote workflow's promote-prod job
# on every final (non-RC) vX.Y.Z tag push in lahavrud/rs-recruiting (issue
# #23) — ArgoCD auto-syncs from there.
image:
  repository: "<ECR_REPOSITORY_URL>/rs-recruiting-backend"
  tag: "placeholder"

# Created by Tofu (rs-recruiting-infra's environment module) from real
# RDS/JWT values — see helm/backend's README in rs-recruiting for why no
# secret material lives in this file.
existingSecret: backend-secrets

# Unprefixed — matches rs-recruiting-infra's cdn.tf, which forwards /api etc.
# to the ALB unprefixed for sandbox-prod.
httpRoute:
  pathPrefix: ""
