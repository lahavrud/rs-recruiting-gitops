# The one thing applied imperatively (by Tofu, via kubectl — see
# rs-recruiting-infra's argocd.tf) instead of through git. Everything else —
# adding, removing, or editing an Application — is a commit to apps/ in this
# repo; ArgoCD picks it up on its own. This is the standard "app of apps"
# bootstrap pattern.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/lahavrud/rs-recruiting-gitops.git
    targetRevision: main
    path: apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
